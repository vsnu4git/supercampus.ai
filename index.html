<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Supercampus — Coming Soon</title>
    <meta name="description" content="Supercampus is coming soon." />
    <style>
      :root {
        color-scheme: light dark;
        --bg: #070a14;
        --fg: rgba(255, 255, 255, 0.92);
        --muted: rgba(255, 255, 255, 0.72);
        --card: rgba(255, 255, 255, 0.06);
        --border: rgba(255, 255, 255, 0.14);
      }

      html,
      body {
        height: 100%;
      }
      body {
        margin: 0;
        font-family:
          ui-sans-serif,
          system-ui,
          -apple-system,
          Segoe UI,
          Roboto,
          Helvetica,
          Arial,
          "Apple Color Emoji",
          "Segoe UI Emoji";
        background: var(--bg);
        color: var(--fg);
      }

      .hero {
        min-height: 100%;
        display: grid;
        place-items: center;
        padding: 28px 16px;
        position: relative;
        overflow: hidden;
      }

      .bg {
        position: absolute;
        inset: 0;
        background-image: url("/images/supercampus.png");
        background-size: cover;
        background-position: center;
        filter: blur(10px) saturate(1.1);
        transform: scale(1.06);
        opacity: 0.55;
      }

      .shade {
        position: absolute;
        inset: 0;
        background: radial-gradient(
            900px 520px at 50% 35%,
            rgba(124, 58, 237, 0.25),
            transparent 55%
          ),
          linear-gradient(
            180deg,
            rgba(7, 10, 20, 0.55) 0%,
            rgba(7, 10, 20, 0.86) 55%,
            rgba(7, 10, 20, 0.95) 100%
          );
      }

      .card {
        position: relative;
        width: min(980px, 100%);
        border: 1px solid var(--border);
        background: var(--card);
        border-radius: 18px;
        overflow: hidden;
        box-shadow:
          0 30px 90px rgba(0, 0, 0, 0.45),
          0 1px 0 rgba(255, 255, 255, 0.05) inset;
      }

      .cardInner {
        display: grid;
        grid-template-columns: 1fr;
      }

      @media (min-width: 900px) {
        .cardInner {
          grid-template-columns: 1.05fr 0.95fr;
        }
      }

      .left {
        padding: 22px;
        display: grid;
        gap: 14px;
        align-content: start;
      }

      .badge {
        display: inline-flex;
        width: fit-content;
        align-items: center;
        gap: 10px;
        padding: 8px 12px;
        border: 1px solid var(--border);
        border-radius: 999px;
        background: rgba(0, 0, 0, 0.16);
        color: var(--muted);
        letter-spacing: 0.08em;
        text-transform: uppercase;
        font-size: 12px;
      }

      h1 {
        margin: 0;
        font-size: clamp(28px, 4.2vw, 44px);
        line-height: 1.08;
        letter-spacing: -0.03em;
      }

      p {
        margin: 0;
        color: var(--muted);
        line-height: 1.6;
        font-size: 15px;
      }

      .right {
        border-left: 0;
        border-top: 1px solid var(--border);
        background: rgba(0, 0, 0, 0.14);
        display: grid;
        place-items: center;
        padding: 18px;
      }

      @media (min-width: 900px) {
        .right {
          border-top: 0;
          border-left: 1px solid var(--border);
        }
      }

      .imgWrap {
        width: 100%;
        border-radius: 14px;
        overflow: hidden;
        border: 1px solid rgba(255, 255, 255, 0.14);
        background: rgba(255, 255, 255, 0.04);
      }

      img {
        width: 100%;
        height: auto;
        display: block;
      }

      .footer {
        padding: 14px 22px 18px;
        border-top: 1px solid var(--border);
        color: rgba(255, 255, 255, 0.58);
        font-size: 12px;
        display: flex;
        justify-content: space-between;
        gap: 12px;
        flex-wrap: wrap;
      }
    </style>
  </head>
  <body>
    <main class="hero" role="main">
      <div class="bg" aria-hidden="true"></div>
      <div class="shade" aria-hidden="true"></div>

      <section class="card" aria-label="Coming soon">
        <div class="cardInner">
          <div class="left">
            <div class="badge">Coming soon</div>
            <h1>Supercampus</h1>
            <p>The one stop campus application.</p>
            <p>We’re working on something exciting. Check back soon.</p>
          </div>

          <div class="right">
            <div class="imgWrap">
              <img
                src="/images/supercampus.png"
                alt="Supercampus banner"
                loading="eager"
              />
            </div>
          </div>
        </div>

        <div class="footer">
          <span>© 2026 Supercampus. All rights reserved.</span>
          <span>/images/supercampus.png</span>
        </div>
      </section>
    </main>
  </body>
</html>
