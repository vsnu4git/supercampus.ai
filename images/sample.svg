<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630">
  <defs>
    <linearGradient id="g" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#7c3aed"/>
      <stop offset="1" stop-color="#0ea5e9"/>
    </linearGradient>
    <filter id="shadow" x="-30%" y="-30%" width="160%" height="160%">
      <feDropShadow dx="0" dy="10" stdDeviation="18" flood-color="#000" flood-opacity="0.35"/>
    </filter>
  </defs>
  <rect width="1200" height="630" fill="#0b0f1a"/>
  <circle cx="260" cy="150" r="260" fill="url(#g)" opacity="0.55"/>
  <circle cx="1000" cy="120" r="260" fill="url(#g)" opacity="0.25"/>
  <rect x="120" y="170" width="960" height="290" rx="28" fill="rgba(255,255,255,0.07)" stroke="rgba(255,255,255,0.14)" filter="url(#shadow)"/>
  <text x="600" y="300" text-anchor="middle" font-family="ui-sans-serif, system-ui, -apple-system, Segoe UI, Roboto, Helvetica, Arial" font-size="56" fill="rgba(255,255,255,0.92)" font-weight="700">
    sample.svg
  </text>
  <text x="600" y="360" text-anchor="middle" font-family="ui-sans-serif, system-ui, -apple-system, Segoe UI, Roboto, Helvetica, Arial" font-size="22" fill="rgba(255,255,255,0.72)">
    Replace this file with your own image to keep the URL stable.
  </text>
  <text x="600" y="420" text-anchor="middle" font-family="ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, Liberation Mono, Courier New, monospace" font-size="18" fill="rgba(255,255,255,0.72)">
    /images/sample.svg
  </text>
</svg>

